
<script type="module" src="checkIfNotLoggedIn.js" defer></script>
<script type="module" src="userMenu.js" defer></script>
<script type="module" src="dashboardItens.js" defer></script>
<script type="module" src="dashboardMain.js" defer></script>


<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lab Automation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">

</head>
<body>
    <div class = "mainCol">

        <!--This here is the device creation modal, hidden by default-->
        <div id="addDeviceModal" class="modal hidden">
            <div class="modalContent">
                <h2>Novo dispositivo</h2>

                <input id="deviceName" placeholder="Device name">
                <select id="deviceType">
                    <option value="photoPeriod">Foto Período</option>
                </select>
                <div class="row">
                    <button id="createDevice">Criar</button>
                    <button id="cancelDevice">Cancelar</button>
                </div>
            </div>
        </div>
        
        <div class = "header">
            <h1 class = "headerTitle"> Lab Automation  ⋆˚☆˖ ｡° ✮˖ ˚ ⋆｡° ✮˖ ⋆.˚ ˚☆</h1>
            <div class = "row">
                <div class="userMenu">
                    <img id="userAvatar" class="avatar" src="" alt="User">

                    <div id="dropdown" class="dropdown hidden">
                        <div id="userEmail" class="dropdownItem"></div>
                        <hr>
                        <button id="logoutBtn" class="dropdownItem">Logout</button>
                    </div>
                    
                </div>
            </div>
        </div>
        <!-- This container here is populated by the javascript -->
        <div id="container" class="deviceList"></div>
        
        <button id = "addDeviceButton" class = "addDeviceButton">+</button>
    </div>

    
</body>
</html>
